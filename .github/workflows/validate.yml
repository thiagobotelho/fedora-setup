name: validate

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m compileall -q install.py workstation_setup tests
      - run: python -m unittest discover -s tests -v
      - run: python install.py --profile minimal --dry-run
      - run: python install.py --profile full --hardware-profile precision-3591 --force-hardware --dry-run
      - run: python -m json.tool hardware/profiles/precision-3591.json >/dev/null
      - run: bash -n assets/bin/dell-monitor
